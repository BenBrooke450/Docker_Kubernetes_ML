apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp-deployment
  labels:
    tier: frontend
    app: nginx

spec:
  selector:
    matchLabels:
      app: myapp

  replicas: 5
  template:
    metadata:
      name: nginx-2
      labels:
        app: myapp
        version: v4

    spec:
      containers:
        - name: nginx
          image: nginx:1.19.4